name: ML Pipeline - Train & Register Model

on:
  push:
    branches: [main]
    paths:
      - 'pipelines/**'
      - 'inference/**'
      - 'config.yaml'
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-1

jobs:
  run-pipeline:
    name: Train & Register Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify data exists in S3
        run: |
          echo "Checking if training data exists in S3..."
          aws s3 ls s3://carbon-emissions-ml/carbon-emissions/raw/shipments.csv
          echo "✅ Data found in S3"

      - name: Run Preprocessing on SageMaker
        run: |
          python -c "
          import boto3, time, sys
          sys.path.insert(0, '.')
          import sagemaker
          from sagemaker.processing import ScriptProcessor, ProcessingInput, ProcessingOutput
          from pipelines.config import load_config, get_role_arn

          config = load_config()
          region = config['aws']['region']
          bucket = config['aws']['s3_bucket']
          prefix = config['aws']['s3_prefix']

          sess = sagemaker.Session(boto_session=boto3.Session(region_name=region))
          role = get_role_arn(config)

          sklearn_processor = ScriptProcessor(
              command=['python3'],
              image_uri=sagemaker.image_uris.retrieve('sklearn', region, version='1.2-1'),
              instance_type=config['pipeline']['instance_type_processing'],
              instance_count=1,
              role=role,
              sagemaker_session=sess,
          )

          print('Starting preprocessing job...')
          sklearn_processor.run(
              inputs=[
                  ProcessingInput(
                      source=f's3://{bucket}/{prefix}/raw/shipments.csv',
                      destination='/opt/ml/processing/input',
                  ),
              ],
              outputs=[
                  ProcessingOutput(
                      output_name='train',
                      source='/opt/ml/processing/output/train',
                      destination=f's3://{bucket}/{prefix}/processed/train',
                  ),
                  ProcessingOutput(
                      output_name='test',
                      source='/opt/ml/processing/output/test',
                      destination=f's3://{bucket}/{prefix}/processed/test',
                  ),
              ],
              code='pipelines/preprocess.py',
          )
          print('✅ Preprocessing completed!')
          "

      - name: Train model & Register (local)
        env:
          SAGEMAKER_SUPPRESS_V2_WARNING: "1"
        run: python pipelines/train_local.py

      - name: Verify model registered
        run: |
          python -c "
          import boto3, sys
          sys.path.insert(0, '.')
          from pipelines.config import load_config

          config = load_config()
          sm = boto3.client('sagemaker', region_name='${{ env.AWS_REGION }}')

          response = sm.list_model_packages(
              ModelPackageGroupName=config['endpoint']['model_package_group'],
              ModelApprovalStatus='PendingManualApproval',
              SortBy='CreationTime',
              SortOrder='Descending',
              MaxResults=1
          )
          packages = response.get('ModelPackageSummaryList', [])
          if packages:
              arn = packages[0]['ModelPackageArn']
              print(f'✅ Model registered: {arn}')
              print()
              print('Next steps:')
              print(f'  1. Approve: aws sagemaker update-model-package --model-package-arn {arn} --model-approval-status Approved')
              print('  2. Deploy: Trigger the deploy-endpoint workflow')
          else:
              print('❌ No model registered (R² threshold not met).')
              sys.exit(1)
          "
