name: ML Pipeline - Train & Register Model

on:
  push:
    branches: [main]
    paths:
      - 'pipelines/**'
      - 'inference/**'
      - 'config.yaml'
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: ap-south-1

jobs:
  run-pipeline:
    name: Trigger SageMaker Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify data exists in S3
        run: |
          echo "Checking if training data exists in S3..."
          aws s3 ls s3://carbon-emissions-ml/carbon-emissions/raw/shipments.csv
          echo "✅ Data found in S3"

      - name: Run SageMaker Pipeline
        run: python pipelines/pipeline.py

      - name: Wait for pipeline completion
        run: |
          python -c "
          import boto3, time, sys
          sys.path.insert(0, '.')
          from pipelines.config import load_config

          config = load_config()
          sm = boto3.client('sagemaker', region_name='${{ env.AWS_REGION }}')
          pipeline_name = config['pipeline']['name']

          # Get latest execution
          response = sm.list_pipeline_executions(
              PipelineName=pipeline_name,
              SortBy='CreationTime',
              SortOrder='Descending',
              MaxResults=1
          )
          execution_arn = response['PipelineExecutionSummaries'][0]['PipelineExecutionArn']
          print(f'Monitoring: {execution_arn}')

          # Poll until complete
          while True:
              status = sm.describe_pipeline_execution(
                  PipelineExecutionArn=execution_arn
              )['PipelineExecutionStatus']
              print(f'Status: {status}')
              if status in ['Succeeded', 'Failed', 'Stopped']:
                  break
              time.sleep(60)

          if status != 'Succeeded':
              print(f'Pipeline failed with status: {status}')
              sys.exit(1)

          print('✅ Pipeline completed successfully!')
          "

      - name: Verify model registered
        run: |
          python -c "
          import boto3, sys
          sys.path.insert(0, '.')
          from pipelines.config import load_config

          config = load_config()
          sm = boto3.client('sagemaker', region_name='${{ env.AWS_REGION }}')

          response = sm.list_model_packages(
              ModelPackageGroupName=config['endpoint']['model_package_group'],
              ModelApprovalStatus='PendingManualApproval',
              SortBy='CreationTime',
              SortOrder='Descending',
              MaxResults=1
          )
          packages = response.get('ModelPackageSummaryList', [])
          if packages:
              arn = packages[0]['ModelPackageArn']
              print(f'✅ Model registered: {arn}')
              print()
              print('Next steps:')
              print(f'  1. Approve: aws sagemaker update-model-package --model-package-arn {arn} --model-approval-status Approved')
              print('  2. Deploy: Trigger the deploy-endpoint workflow')
          else:
              print('❌ No model registered (R² threshold not met).')
              sys.exit(1)
          "
